name: Deploy to Firebase (App Hosting)

on:
  # Manual deploy
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        type: choice
        options:
          - production

  # Automatic deploy after CI succeeds
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  deployments: write

jobs:
  determine-environment:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=production" >> $GITHUB_OUTPUT
          fi

  deploy:
    name: Deploy to Firebase App Hosting
    runs-on: ubuntu-latest
    needs: determine-environment
    # Only deploy if CI workflow succeeded (for automatic deploys)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    # Use the correct GitHub environment to access its secrets
    environment: ${{ needs.determine-environment.outputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # App Hosting builds in the cloud, so we don't need Node.js setup or local builds
      # Just need Firebase CLI for deployment commands

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Set up Firebase credentials
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$FIREBASE_CREDENTIALS" > $HOME/firebase.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/firebase.json" >> $GITHUB_ENV

      - name: Determine Firebase project
        id: firebase-project
        run: |
          case "${{ needs.determine-environment.outputs.environment }}" in
            development)
              echo "project_id=zen-razor" >> $GITHUB_OUTPUT
              echo "backend_name=zen-razor-website" >> $GITHUB_OUTPUT
              ;;
            production)
              echo "project_id=zen-razor" >> $GITHUB_OUTPUT
              echo "backend_name=zen-razor-website" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "❌ Unknown environment: ${{ needs.determine-environment.outputs.environment }}"
              exit 1
              ;;
          esac

      - name: Install Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: "latest"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Firebase App Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          PROJECT_ID="${{ steps.firebase-project.outputs.project_id }}"
          BACKEND_NAME="${{ steps.firebase-project.outputs.backend_name }}"

          echo "🚀 Creating rollout for $BACKEND_NAME on $PROJECT_ID..."
          echo "📦 Deploying commit: ${{ github.sha }}"

          # Create rollout using current commit
          firebase apphosting:rollouts:create $BACKEND_NAME \
            --project $PROJECT_ID \
            --git-commit ${{ github.sha }} \
            --force

      - name: Show App Hosting URL
        run: |
          case "${{ needs.determine-environment.outputs.environment }}" in
            production)
              echo "🌐 Live App Hosting URL: https://zen-razor-website--zen-razor.europe-west4.hosted.app/"
              ;;
          esac
