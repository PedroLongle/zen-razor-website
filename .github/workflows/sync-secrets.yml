name: Sync Secrets to Google Cloud Secret Manager

on:
  # Manual trigger only
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to sync secrets for"
        required: true
        type: choice
        options:
          - production

permissions:
  contents: read

jobs:
  determine-environments:
    name: Determine Environments
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.env.outputs.environments }}
    steps:
      - name: Determine environments to sync
        id: env
        run: |
          ENV_INPUT="${{ github.event.inputs.environment }}"
          if [ "$ENV_INPUT" = "both" ] || [ -z "$ENV_INPUT" ]; then
            echo 'environments=["development","production"]' >> $GITHUB_OUTPUT
          else
            echo "environments=[\"$ENV_INPUT\"]" >> $GITHUB_OUTPUT
          fi

  sync-secrets:
    name: Sync Secrets for ${{ matrix.environment }}
    runs-on: ubuntu-latest
    needs: determine-environments
    strategy:
      matrix:
        environment: ${{ fromJSON(needs.determine-environments.outputs.environments) }}
    # Use the correct GitHub environment to access its secrets (must be after strategy)
    environment: ${{ matrix.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: "latest"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Sync environment variables to Google Cloud Secret Manager
        env:
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
        run: |
          PROJECT_ID="$NEXT_PUBLIC_FIREBASE_PROJECT_ID"

          if [ -z "$PROJECT_ID" ]; then
            echo "❌ Error: NEXT_PUBLIC_FIREBASE_PROJECT_ID is required"
            exit 1
          fi

          echo "🔐 Syncing environment variables to Google Cloud Secret Manager for $PROJECT_ID (${{ matrix.environment }})..."

          # Function to create or update a secret
          set_secret() {
            local secret_name=$1
            local secret_value=$2
            
            if [ -z "$secret_value" ]; then
              echo "⚠️  Warning: $secret_name is empty, skipping..."
              return
            fi
            
            echo "Setting $secret_name..."
            
            # Check if secret exists
            if gcloud secrets describe "$secret_name" --project="$PROJECT_ID" &>/dev/null; then
              # Secret exists, add new version
              echo -n "$secret_value" | gcloud secrets versions add "$secret_name" \
                --project="$PROJECT_ID" \
                --data-file=-
              echo "✅ Updated $secret_name"
            else
              # Secret doesn't exist, create it
              echo -n "$secret_value" | gcloud secrets create "$secret_name" \
                --project="$PROJECT_ID" \
                --replication-policy="automatic" \
                --data-file=-
              echo "✅ Created $secret_name"
            fi
          }

          # Set only the essential server-side secrets
          set_secret "NEXT_PUBLIC_FIREBASE_PROJECT_ID" "$NEXT_PUBLIC_FIREBASE_PROJECT_ID"

          echo "✅ Environment variables synced successfully!"

          # Grant App Hosting service account access to secrets
          echo "🔑 Granting App Hosting service account access to secrets..."

          # Get the App Hosting service account
          APP_HOSTING_SA="firebase-app-hosting@${PROJECT_ID}.iam.gserviceaccount.com"

          # Grant secret accessor role for each secret
          for secret in "NEXT_PUBLIC_FIREBASE_PROJECT_ID"; do
            echo "Granting access to $secret..."
            if gcloud secrets add-iam-policy-binding "$secret" \
              --project="$PROJECT_ID" \
              --member="serviceAccount:$APP_HOSTING_SA" \
              --role="roles/secretmanager.secretAccessor" \
              --quiet 2>/dev/null; then
              echo "✅ Granted access to $secret"
            else
              echo "ℹ️  Already has access to $secret (or error occurred)"
            fi
          done

          echo "✅ Permissions granted for ${{ matrix.environment }}!"
